name: Snyk Security Scan

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

permissions:
    contents: read
    security-events: write


jobs:
    snyk_scan:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
        - name: Install root dependencies
          run: npm install
        - name: Install subproject dependencies
          run: |
            cd momentum-api && npm install && cd ..
            cd momentum-mobile && npm install && cd ..
            cd momentum-mobile-bff && npm install && cd ..
            cd momentum-shared && npm install && cd ..
            cd momentum-web && npm install && cd ..
        - name: install snyk cli
          run: npm install -g snyk
        - name: Run Snyk scan
          continue-on-error: true
          env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          run: snyk test --all-projects --json > snyk-results.json 2>&1
        - name: Run Snyk SARIF scan
          continue-on-error: true
          env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          run: snyk test --all-projects --sarif-file-output=snyk.sarif
        - name: Upload Snyk results to GitHub
          if: always()
          uses: github/codeql-action/upload-sarif@v3
          with:
            sarif_file: snyk.sarif